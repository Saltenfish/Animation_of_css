*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;font-family:'Courier New',monospace;color:#fff;padding:24px 16px;}
h1{text-align:center;font-size:22px;letter-spacing:6px;text-transform:uppercase;margin-bottom:4px;}
.sub{text-align:center;font-size:11px;letter-spacing:3px;color:#444;margin-bottom:32px;}
.cat{margin-bottom:32px;}
.cat-title{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#555;margin-bottom:10px;padding-left:10px;border-left:2px solid #333;}

/* 2-col on desktop, 1-col on mobile */
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;align-items:stretch;min-width:0;}
@media(max-width:680px){.row{grid-template-columns:1fr;}}

/* Left: info + live preview */
.left-panel{border-radius:4px;padding:12px 14px;display:flex;flex-direction:column;gap:6px;min-height:120px;min-width:0;overflow:hidden;}
.anim-name{font-size:13px;font-weight:700;letter-spacing:1.5px;}
.anim-zh{font-size:10px;opacity:.7;letter-spacing:1px;}
.anim-desc{font-size:10px;opacity:.55;line-height:1.5;}
.anim-use{font-size:9px;opacity:.4;letter-spacing:.5px;}
.preview-area{margin-top:6px;border-radius:3px;padding:6px 8px;text-align:center;overflow:hidden;}
.preview-area span{display:inline-block;font-family:sans-serif;font-weight:900;font-size:13px;letter-spacing:2px;max-width:100%;word-break:break-word;}

/* Right: code box — must NOT grow beyond its grid cell */
.code-wrap{border-radius:4px;background:#0e0e16;border:1px solid #1e1e2e;padding:12px;position:relative;min-width:0;display:flex;flex-direction:column;justify-content:center;}
/* The key fix: pre stays inside its column and scrolls horizontally */
pre{font-family:'Courier New',monospace;font-size:10px;line-height:1.7;white-space:nowrap;overflow-x:auto;width:100%;padding-bottom:4px;padding-right:52px;scrollbar-width:thin;scrollbar-color:#252535 #0e0e16;}
pre::-webkit-scrollbar{height:3px;}
pre::-webkit-scrollbar-track{background:#0e0e16;}
pre::-webkit-scrollbar-thumb{background:#252535;border-radius:2px;}

.copy-btn{position:absolute;top:8px;right:8px;background:#1a1a2a;border:1px solid #2e2e4e;border-radius:3px;color:#666;font-family:'Courier New',monospace;font-size:9px;letter-spacing:1px;padding:4px 8px;cursor:pointer;z-index:10;white-space:nowrap;transition:all .15s;}
.copy-btn:hover{background:#2a2a3a;color:#aaa;}
.copy-btn.ok{color:#55efc4;border-color:#55efc4;}

/* syntax highlight */
.ht{color:#74b9ff;}.ha{color:#fd79a8;}.hv{color:#a8ff78;}.hn{color:#fdcb6e;}.hk{color:#ff9f7f;}

/* card colours */

<script>
var CDN='https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css';

function doCopy(btn){
  var raw=btn.parentElement.querySelector('pre').getAttribute('data-code');
  function ok(){btn.textContent='✓ 已複製';btn.classList.add('ok');setTimeout(function(){btn.textContent='複製';btn.classList.remove('ok');},1800);}
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(raw).then(ok).catch(function(){fb(raw,ok);});
  }else{fb(raw,ok);}
}
function fb(text,ok){
  var ta=document.createElement('textarea');
  ta.value=text;ta.style.cssText='position:fixed;left:-9999px;top:-9999px;opacity:0;';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');ok();}catch(e){}
  document.body.removeChild(ta);
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function buildRow(cc,animClasses,zh,desc,use,bg,color,txt){
  var raw='<link rel="stylesheet" href="'+CDN+'"/><div style="background:'+bg+';padding:6px 0;text-align:center;font-family:sans-serif;"><span class="animate__animated '+animClasses+'" style="display:inline-block;color:'+color+';font-weight:900;font-size:14px;letter-spacing:2px;">'+txt+'</span></div>';
  var hl='<span class="ht">&lt;link</span> <span class="ha">rel</span>=<span class="hv">"stylesheet"</span> <span class="ha">href</span>=<span class="hv">"'+esc(CDN)+'"</span><span class="ht">/&gt;&lt;div</span> <span class="ha">style</span>=<span class="hv">"background:<span class="hk">'+bg+'</span>;padding:6px 0;text-align:center;font-family:sans-serif;"</span><span class="ht">&gt;&lt;span</span> <span class="ha">class</span>=<span class="hv">"animate__animated <span class="hn">'+esc(animClasses)+'"</span></span> <span class="ha">style</span>=<span class="hv">"display:inline-block;color:<span class="hk">'+color+'</span>;font-weight:900;font-size:14px;letter-spacing:2px;"</span><span class="ht">&gt;</span>'+esc(txt)+'<span class="ht">&lt;/span&gt;&lt;/div&gt;</span>';
  var shortName=animClasses.split(' ')[0].replace('animate__','');
  return '<div class="row">'
    +'<div class="left-panel '+cc+'">'
      +'<div class="anim-name">'+shortName+'</div>'
      +'<div class="anim-zh">'+zh+'</div>'
      +'<div class="anim-desc">'+desc+'</div>'
      +'<div class="anim-use">用法：'+use+'</div>'
      +'<div class="preview-area" style="background:'+bg+';">'
        +'<span class="animate__animated '+animClasses+'" style="color:'+color+';font-weight:900;font-size:13px;letter-spacing:2px;">'+txt+'</span>'
      +'</div>'
    +'</div>'
    +'<div class="code-wrap">'
      +'<button class="copy-btn" onclick="doCopy(this)">複製</button>'
      +'<pre data-code="'+raw.replace(/"/g,'&quot;')+'">'+hl+'</pre>'
    +'</div>'
    +'</div>';
}
